name: "[Job] Deploy to Environment"

permissions:
  id-token: write
  contents: write
  security-events: write
  pull-requests: read

on:
  workflow_call:
    inputs:
      workspace_name:
        description: "The terraform workspace to target for environment actions"
        required: true
        type: string

      oidc_role:
        description: "The OIDC role to assume for AWS access"
        required: true
        type: string

      default_role:
        description: "The default CI role to assume"
        required: true
        type: string

      management_role:
        description: "The management CI role to assume"
        required: true
        type: string

      backup_role:
        description: "The backup CI role to assume"
        required: true
        type: string

      version_tag:
        description: "The docker image tag to deploy in the environment"
        required: true
        type: string

      apply:
        description: "Whether to apply the deployment"
        required: false
        type: boolean
        default: false

    secrets:
      allowlist_deploy_key:
        description: "SSH Deploy Key"
        required: true
      github_access_token:
        description: "Github Token"
        required: true
      snyk_opg_org_token:
        description: "Snyk token for OPG organization"
        required: true
    outputs:
      base_url:
        description: "Base URL of API"
        value: ${{ jobs.terraform_environment_workflow.outputs.url }}

jobs:
  terraform_environment_workflow:
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.terraform_outputs.outputs.url }}
    env:
      tf_dir: "./terraform/environment"
      TF_WORKSPACE: ${{ inputs.workspace_name }}
      TF_VAR_app_version: ${{ inputs.version_tag }}
      TF_VAR_default_role: ${{ inputs.default_role }}
      TF_VAR_management_role: ${{ inputs.management_role }}
      TF_VAR_backup_role: ${{ inputs.backup_role }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: "0"

      - name: "Parse terraform version [directory: ${{ env.tf_dir }}]"
        id: tf_version
        uses: ministryofjustice/opg-github-actions/actions/terraform-version@2186f4ee10b7f2839e0c795dcd01c729e6d1d4c0 # v4.8.1
        with:
          terraform_directory: ${{ env.tf_dir }}
      - name: "Terraform version [${{ steps.tf_version.outputs.version }}]"
        run: echo "terraform version [${{ steps.tf_version.outputs.version }}]" >> $GITHUB_STEP_SUMMARY
        working-directory: ${{ env.tf_dir }}
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ steps.tf_version.outputs.version }}
          terraform_wrapper: false

      - name: Setup SSH private key
        id: deploy-key
        uses: ministryofjustice/opg-github-actions/actions/github-deploy-key@2186f4ee10b7f2839e0c795dcd01c729e6d1d4c0 # v4.8.1
        with:
          deploy_key: ${{ secrets.allowlist_deploy_key }}

      # AWS API Gateway doesn't support OpenAPI 3.1, so downgrade to 3.0
      - name: Compile OpenAPI file
        run: make build-apigw-openapi-spec

      - name: Format Terraform
        run: terraform fmt -check -recursive
        working-directory: ${{ env.tf_dir }}

      - uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # v6.2.2
        name: Setup TFLint
        with:
          tflint_version: v0.60.0

      - name: Lint Terraform
        id: tf_lint
        run: tflint --recursive

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          aws-region: eu-west-1
          role-to-assume: ${{ vars.OIDC_MANAGEMENT_ECR_ROLE }}
          role-duration-seconds: 3600
          role-session-name: GitHubActions

      - name: ECR Login
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@376925c9d111252e87ae59691e5a442dd100ef6a # v2.1.3
        with:
          registries: 311462405659

      - name: Snky IAC
        id: snyk_iac
        uses: ministryofjustice/opg-github-actions/actions/snyk-iac@2186f4ee10b7f2839e0c795dcd01c729e6d1d4c0 # v4.8.1
        with:
          iac_test_directory: "./terraform/environment/"
          sarif_filename: "snyk-iac.sarif"
          SNYK_TOKEN: ${{ secrets.snyk_opg_org_token }}

      - name: Upload Snyk IAC scan results to GitHub Security tab
        id: snyk_upload_sarif
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        if: always()
        with:
          category: "Terraform"
          sarif_file: "test-results/snyk-iac.sarif"

      - name: Configure AWS Credentials For Terraform
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
        with:
          aws-region: eu-west-1
          role-to-assume: ${{ inputs.oidc_role }}
          role-duration-seconds: 3600
          role-session-name: environment-deploy-github-action

      - name: Terraform Init
        env:
          TF_WORKSPACE: default
        run: terraform init -input=false
        working-directory: ${{ env.tf_dir }}

      - name: Terraform Plan
        run: |
          terraform workspace show
          terraform plan -lock-timeout=300s -input=false -parallelism=30 -out=terraform.plan
        working-directory: ${{ env.tf_dir }}

      - name: Terraform Apply
        if: inputs.apply == true
        run: |
          terraform apply -lock-timeout=300s -input=false -auto-approve -parallelism=30 terraform.plan
        working-directory: ${{ env.tf_dir }}

      - name: Terraform Outputs
        if: inputs.apply == true
        id: terraform_outputs
        run: |
          echo "url=$(terraform output -raw base_url)" >> $GITHUB_OUTPUT
        working-directory: ${{ env.tf_dir }}
